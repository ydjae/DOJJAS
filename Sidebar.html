  <style>
    /* Custom gradients and specific states not easily handled by pure Tailwind */
    body {
      background: linear-gradient(180deg, #f6f8fc 0%, #edf4f3 100%);
    }
    
    /* Border loading animation */
    @keyframes borderLoad {
      0% { clip-path: inset(100% 0 0 0); }
      100% { clip-path: inset(0 0 0 0); }
    }
    
    .border-loading {
      position: relative;
      overflow: hidden;
    }
    
    .border-loading::after {
      content: '';
      position: absolute;
      inset: 0;
      border: 2px solid currentColor;
      border-radius: 12px;
      animation: borderLoad 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      pointer-events: none;
    }
    
    #step2ApplicantsList::-webkit-scrollbar {
      width: 4px;
    }
    #step2ApplicantsList::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 10px;
    }
    /* The line connecting the steps */
    .step-container {
      position: relative;
    }

    .step-container::before {
      content: "";
      position: absolute;
      left: 28px; /* Centers the line under the 8x8 (32px) circle */
      top: 40px;
      bottom: -20px;
      width: 2px;
      background-color: #e2e8f0; /* slate-200 */
      z-index: 0;
    }

    .step-container button {
      justify-content: flex-start;
      text-align: left;
    }

    .step-container button span,
    .step-container button p {
      text-align: left;
    }

    /* Hide the line on the very last step */
    .step-container:last-child::before {
      display: none;
    }
  </style>
</head>

<script>
  // Initialize Lucide Icons
  lucide.createIcons();

  // --- Utility: The Waterfall Unlocker ---
  function unlockNextStep(stepIndex) {
    const containers = document.querySelectorAll('.step-container');
    const container = containers[stepIndex]; // index 1 is Step 2, etc.
    
    if (container) {
      const button = container.querySelector('button');
      // Remove visual "locked" state
      container.classList.remove('grayscale', 'opacity-50');
      // Enable functionality
      button.disabled = false;
      button.classList.remove('cursor-not-allowed');
      button.classList.add('cursor-pointer', 'transition', 'active:scale-95');
      // Smooth scroll for long sidebars
      container.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  }

  function setButtonEnabled(button, enabled) {
    if (!button) return;
    button.disabled = !enabled;
    button.classList.toggle('cursor-not-allowed', !enabled);
    button.classList.toggle('cursor-pointer', enabled);
    if (enabled) {
      button.classList.remove('opacity-50');
      const container = button.closest('.step-container');
      if (container) {
        container.classList.remove('grayscale', 'opacity-50');
      }
    } else {
      button.classList.add('opacity-50');
    }
  }

  // UI Elements
  const landingPage = document.getElementById('landingPage');
  const statusDiv = document.getElementById('status'); // Global status from original script
  
  // Navigation Buttons
  const navButtons = {
    forExam: document.getElementById('forExamBtn'),
    unqualified: document.getElementById('unqualifiedBtn'),
    forInterview: document.getElementById('forInterviewBtn'),
    failed: document.getElementById('failedBtn'),
    backup: document.getElementById('backupBtn')
  };

  // Step Completion Tracking
  const stepStatus = {
    step1: false, step2: false, step3: false, 
    step4: false, step5: false, step6: false
  };

  let currentLetterType = 'forExam';

  // --- Navigation Logic ---
  function showLanding() {
    landingPage.classList.remove('hidden');
    landingPage.classList.add('flex');
    ['forExamPage', 'unqualified-page', 'for-interview-page', 'failed-page'].forEach(id => {
      const page = document.getElementById(id);
      if (page) {
        page.classList.add('hidden');
        page.classList.remove('block');
      }
    });
  }

  function showPage(type) {
    currentLetterType = type;
    ['landingPage', 'forExamPage', 'unqualified-page', 'for-interview-page', 'failed-page'].forEach(id => {
      const page = document.getElementById(id);
      if (page) {
        page.classList.add('hidden');
        page.classList.remove('block');
      }
    });

    const pageId = {
      forExam: 'forExamPage',
      unqualified: 'unqualified-page',
      forInterview: 'for-interview-page',
      failed: 'failed-page'
    }[type];
    const page = document.getElementById(pageId);
    if (page) {
      page.classList.remove('hidden');
      page.classList.add('block');
    }
  }

  // --- Step 1: Validate Columns ---
  document.getElementById('validateColumnsBtn').addEventListener('click', function() {
    const btn = this;
    const statusLabel = document.getElementById('step1Status');
    
    btn.disabled = true;
    btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Validating...';
    lucide.createIcons();

    google.script.run
      .withSuccessHandler((res) => {
        if (res.hasData) {
          stepStatus.step1 = true;
          statusLabel.innerText = "✓ Columns O-R verified!";
          statusLabel.className = "text-[10px] px-2 mt-2 font-semibold text-center text-green-600";
          btn.innerHTML = '<i data-lucide="check-circle" class="w-4 h-4"></i> Complete';
          btn.className = "group flex items-center justify-start gap-2 w-full py-2 px-2 bg-green-100 text-green-700 rounded-xl text-sm font-bold border border-green-200 cursor-default";
          
          unlockNextStep(1); // Unlock Step 2
        } else {
          statusLabel.innerText = "❌ Missing data in columns O-R";
          statusLabel.className = "text-[10px] px-2 mt-2 font-semibold text-center text-red-600";
          btn.disabled = false;
          btn.innerHTML = '<i data-lucide="check-circle" class="w-4 h-4"></i> Fill Columns O-R';
        }
        lucide.createIcons();
      })
      .checkColumnsOtoR();
  });

  // --- Step 2: Run Complete Process ---
  document.getElementById('runProcessBtn').addEventListener('click', function() {
    const btn = this;
    const statusLabel = document.getElementById('step2Status');
    
    btn.disabled = true;
    btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Processing...';

        stepStatus.step2 = true;
        statusLabel.innerText = "✓ Letters generated!";
        statusLabel.className = "text-[10px] px-2 mt-2 font-semibold text-center text-green-600";

        unlockNextStep(2); // Unlock Step 3
        lucide.createIcons();
      })
      .runCompleteProcess();
  });

  // --- Step 3: Open Folder ---
  document.getElementById('openFolderBtn').addEventListener('click', function() {
    const btn = this;
    google.script.run
      .withSuccessHandler((folderUrl) => {
        if (folderUrl) {
          window.open(folderUrl, '_blank');
          stepStatus.step3 = true;
          btn.innerHTML = '<i data-lucide="check-circle" class="w-4 h-4"></i> Complete';
          btn.className = "group flex items-center justify-start gap-2 w-full py-2 px-2 bg-green-100 text-green-700 rounded-xl text-sm font-bold border border-green-200 cursor-default";
          btn.disabled = true;

          lucide.createIcons();

      .getFolderUrl(currentLetterType);
  });

// --- Step 4: Generate Links ---
  document.getElementById('generateLinksBtn').addEventListener('click', function() {
    const btn = this;
    const statusLabel = document.getElementById('step4Status');
    
    // 1. Set Loading UI
    btn.disabled = true;
    btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Generating...';
    lucide.createIcons();

    google.script.run
      .withSuccessHandler((resultMessage) => {
        // 2. Handle Success
        stepStatus.step4 = true;
        if (statusLabel) {
          statusLabel.innerText = "✓ " + resultMessage;
          statusLabel.className = "text-[10px] px-2 mt-2 font-semibold text-center text-green-600";

        unlockNextStep(4); // Unlocks Step 5
        lucide.createIcons();

        console.error(err);
        if (statusLabel) {
          statusLabel.innerText = "❌ " + err.message;
          statusLabel.className = "text-[10px] px-2 mt-2 font-semibold text-center text-red-600";

        btn.disabled = false;
        btn.innerHTML = '<i data-lucide="link" class="w-4 h-4"></i> Generate Links';
        lucide.createIcons();
      })
      // CHANGE THIS LINE to match your .gs function name
      .forExamGenerateLinks(); 
  });

  // --- Step 5: Verify Links (Manual) ---
    document.getElementById('verifyLinksBtn').addEventListener('click', function() {

      btn.className = "group flex items-center justify-start gap-2 w-full py-2 px-2 bg-green-100 text-green-700 rounded-xl text-sm font-bold border border-green-200 cursor-default";

      // Crucial: Unlock the next step
      unlockNextStep(5); 
      
      // Refresh icons
      lucide.createIcons();
    });

// --- Step 6: Send Emails (Simulated) ---
  document.getElementById('sendExamBtn').addEventListener('click', function() {
    const btn = this;
    const statusLabel = document.getElementById('step6Status');
    
    btn.disabled = true;
    btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Sending...';

    google.script.run
      .withSuccessHandler((res) => {
        stepStatus.step6 = true;

          statusLabel.innerText = "✓ " + res.status + " (" + res.count + " emails)";
          statusLabel.className = "text-[10px] px-2 mt-2 font-semibold text-center text-green-600";

        btn.innerHTML = '<i data-lucide="check-circle" class="w-4 h-4"></i> Complete';
        btn.className = "group flex items-center justify-start gap-2 w-full py-2 px-2 bg-green-100 text-green-700 rounded-xl text-sm font-bold border border-green-200 cursor-default px-4";
        
        unlockNextStep(6); // Unlocks Step 7

    if (validateInterviewBtn) {
      validateInterviewBtn.disabled = false;
      validateInterviewBtn.innerHTML = '<i data-lucide="check-circle" class="w-4 h-4"></i> Fill Columns O-R';
      validateInterviewBtn.className = 'group relative flex items-center justify-center gap-2 w-full py-2 px-2 bg-slate-600 text-white rounded-xl text-sm font-bold shadow-md active:scale-95 hover:bg-slate-700 transition';
    }
    const interviewStep1Status = document.getElementById('interviewStep1Status');
    if (interviewStep1Status) {
      interviewStep1Status.innerText = '';
      interviewStep1Status.className = 'text-[10px] mt-2 font-semibold text-center';
    }

    // Reset Steps 2-7
    const stepsData = [
      { btnId: 'runInterviewProcessBtn', statusId: 'interviewStep2Status', containerIndex: 1 },
      { btnId: 'openInterviewFolderBtn', statusId: 'interviewStep3Status', containerIndex: 2 },
      { btnId: 'generateInterviewLinksBtn', statusId: 'interviewStep4Status', containerIndex: 3 },
      { btnId: 'verifyInterviewLinksBtn', statusId: 'interviewStep5Status', containerIndex: 4 },
      { btnId: 'sendInterviewBtn', statusId: 'interviewStep6Status', containerIndex: 5 },
      { btnId: 'backupInterviewBtn', statusId: 'interviewStep7Status', containerIndex: 6 }
    ];

    const containers = document.querySelectorAll('#for-interview-page .step-container');
    stepsData.forEach((stepData) => {
      const btn = document.getElementById(stepData.btnId);
      if (btn) {
        btn.disabled = true;
        btn.classList.add('cursor-not-allowed');
        btn.classList.remove('cursor-pointer');
        
        const container = containers[stepData.containerIndex];
        if (container) {
          container.classList.add('grayscale', 'opacity-50');
        }
      }

      const statusEl = document.getElementById(stepData.statusId);
      if (statusEl) {
        statusEl.innerText = '';
        statusEl.className = 'text-[10px] mt-2 font-semibold text-center';
      }
    });

    lucide.createIcons();
  }

  document.getElementById('mainMenuBtnInterview').addEventListener('click', function() {
    showLanding();
  });

  document.getElementById('resetBtnInterview').addEventListener('click', function() {
    resetInterviewSteps();
  });

  document.getElementById('goToFailedFromInterviewBtn').addEventListener('click', function() {
    const btn = this;
    btn.classList.add('opacity-50');

    google.script.run
      .withSuccessHandler(() => {
        showPage('failed');
        btn.classList.remove('opacity-50');
        lucide.createIcons();
      })
      .withFailureHandler((err) => {
        btn.classList.remove('opacity-50');
        lucide.createIcons();
        alert('Unable to switch sheets: ' + err.message);
      })
      .setActiveSheetByName('LETTER - FAILED');
  });

  document.getElementById('backBtnInterview').addEventListener('click', showLanding);

</script>

</body>
</html>
